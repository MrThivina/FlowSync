<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowSync Supermarket POS</title>
    <style>
        :root {
            --ink: #172029;
            --muted: #6a7782;
            --line: #e3eaf0;
            --paper: #f7fafc;
            --white: #ffffff;
            --green: #19a66a;
            --green-dark: #107346;
            --teal: #0c8ea0;
            --blue: #3767d6;
            --amber: #d68612;
            --red: #d14343;
            --violet: #6b5bd6;
            --shadow: 0 16px 34px rgba(32, 46, 58, 0.1);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--ink);
            background: linear-gradient(180deg, #eef8f6 0, var(--paper) 260px);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        button, input, select { font: inherit; }
        button { border: 0; cursor: pointer; transition: transform 0.16s ease, box-shadow 0.16s ease, background 0.16s ease; }
        button:hover { transform: translateY(-1px); }
        input, select {
            width: 100%;
            min-height: 46px;
            padding: 0 14px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--white);
            color: var(--ink);
            outline: none;
            box-shadow: 0 1px 0 rgba(23, 32, 41, 0.02);
        }
        input:focus, select:focus {
            border-color: var(--teal);
            box-shadow: 0 0 0 4px rgba(12, 142, 160, 0.12);
        }

        .app {
            display: grid;
            grid-template-columns: 116px minmax(0, 1fr) 390px;
            min-height: 100vh;
        }

        .rail {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 16px 12px;
            background: #111923;
            color: var(--white);
        }

        .brand {
            display: grid;
            place-items: center;
            width: 60px;
            height: 46px;
            margin: 0 auto 10px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--green), var(--teal));
            font-size: 18px;
            font-weight: 900;
            box-shadow: 0 10px 22px rgba(25, 166, 106, 0.28);
        }

        .nav-btn {
            display: grid;
            align-content: center;
            justify-items: center;
            gap: 4px;
            width: 92px;
            min-height: 58px;
            border-radius: 8px;
            color: #bed1dc;
            background: transparent;
            font-size: 12px;
            font-weight: 900;
        }

        .nav-btn span {
            color: inherit;
            font-size: 12px;
            font-weight: 900;
        }

        .nav-btn.active, .nav-btn:hover {
            color: var(--white);
            background: rgba(255, 255, 255, 0.12);
            box-shadow: inset 3px 0 0 var(--green);
        }

        .rail-spacer { flex: 1; }

        .main {
            display: grid;
            grid-template-rows: auto auto minmax(0, 1fr);
            min-width: 0;
        }

        .topbar {
            display: grid;
            grid-template-columns: minmax(220px, 1fr) auto auto;
            gap: 14px;
            align-items: center;
            padding: 20px 24px;
            border-bottom: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(14px);
        }

        .store h1 {
            margin: 0;
            font-size: 24px;
            line-height: 1.1;
        }

        .store span, .muted {
            color: var(--muted);
            font-size: 13px;
        }

        .operator, .clock {
            border-radius: 8px;
            box-shadow: 0 8px 22px rgba(32, 46, 58, 0.06);
        }

        .operator {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
            padding: 8px 12px;
            border: 1px solid var(--line);
            background: var(--white);
        }

        .avatar {
            display: grid;
            place-items: center;
            width: 36px;
            height: 36px;
            flex: 0 0 36px;
            border-radius: 8px;
            color: var(--white);
            background: var(--blue);
            font-weight: 900;
        }

        .clock {
            padding: 11px 14px;
            color: var(--white);
            background: var(--ink);
            font-weight: 900;
        }

        .scanner {
            display: grid;
            grid-template-columns: minmax(220px, 1fr) 170px 120px 140px;
            gap: 12px;
            padding: 16px 24px;
            border-bottom: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.7);
        }

        .content {
            min-width: 0;
            overflow: auto;
            padding: 22px 24px 24px;
        }

        .sales-layout {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 280px;
            gap: 18px;
            align-items: start;
        }

        .section-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            margin-bottom: 14px;
        }

        h2, h3 { margin: 0; }
        h2 { font-size: 20px; }
        h3 { font-size: 15px; }

        .tabs {
            display: flex;
            gap: 8px;
            overflow: auto;
            padding-bottom: 4px;
        }

        .tab {
            min-width: max-content;
            padding: 9px 14px;
            border: 1px solid transparent;
            border-radius: 999px;
            color: var(--muted);
            background: #eaf1f4;
            font-weight: 900;
        }

        .tab.active {
            color: var(--white);
            background: var(--ink);
            box-shadow: 0 10px 20px rgba(23, 32, 41, 0.14);
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(165px, 1fr));
            gap: 14px;
        }

        .product-card {
            display: grid;
            gap: 10px;
            min-height: 174px;
            padding: 14px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--white);
            box-shadow: 0 10px 24px rgba(32, 46, 58, 0.06);
            text-align: left;
        }

        .product-card:hover {
            border-color: rgba(25, 166, 106, 0.5);
            box-shadow: 0 18px 32px rgba(32, 46, 58, 0.1);
        }

        .product-art {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            min-height: 54px;
        }

        .product-art b {
            display: grid;
            place-items: center;
            width: 54px;
            height: 54px;
            border-radius: 8px;
            color: var(--green-dark);
            background: #e6f7ef;
            font-size: 20px;
        }

        .stock {
            padding: 5px 8px;
            border-radius: 999px;
            color: var(--green-dark);
            background: #dff7ea;
            font-size: 11px;
            font-weight: 900;
        }

        .stock.low {
            color: #8a4b00;
            background: #fff0d6;
        }

        .price-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-top: auto;
        }

        .price {
            color: var(--ink);
            font-size: 19px;
            font-weight: 900;
        }

        .add {
            display: grid;
            place-items: center;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            color: var(--white);
            background: var(--green);
            font-size: 20px;
            font-weight: 900;
        }

        .stack { display: grid; gap: 12px; }

        .panel, .metric, .data-card {
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.94);
            box-shadow: 0 10px 24px rgba(32, 46, 58, 0.06);
        }

        .panel { padding: 16px; }
        .metric { padding: 16px; }
        .metric:first-child {
            color: var(--white);
            border: 0;
            background: linear-gradient(135deg, var(--green), var(--teal));
        }
        .metric:first-child span { color: rgba(255, 255, 255, 0.78); }
        .metric span, .data-card span {
            color: var(--muted);
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
        }
        .metric strong, .data-card strong {
            display: block;
            margin-top: 7px;
            font-size: 25px;
        }

        .data-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(160px, 1fr));
            gap: 14px;
            margin-bottom: 16px;
        }

        .data-card { padding: 16px; }

        table {
            width: 100%;
            border-collapse: collapse;
            overflow: hidden;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--white);
            box-shadow: 0 10px 24px rgba(32, 46, 58, 0.05);
        }

        th, td {
            padding: 13px;
            border-bottom: 1px solid var(--line);
            text-align: left;
            font-size: 14px;
        }

        th {
            color: var(--muted);
            background: #f8fbfc;
            font-size: 11px;
            text-transform: uppercase;
        }

        tr:last-child td { border-bottom: 0; }

        .cart {
            display: grid;
            grid-template-rows: auto auto minmax(0, 1fr) auto;
            min-height: 100vh;
            border-left: 1px solid var(--line);
            background: #fbfdfd;
            box-shadow: -14px 0 34px rgba(32, 46, 58, 0.08);
        }

        .cart-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 20px;
            border-bottom: 1px solid var(--line);
            background: var(--white);
        }

        .customer-box {
            display: grid;
            grid-template-columns: 44px 1fr auto;
            gap: 11px;
            align-items: center;
            margin: 16px;
            padding: 13px;
            border: 1px solid #d8f1e5;
            border-radius: 8px;
            background: #effbf5;
        }

        .customer-icon {
            display: grid;
            place-items: center;
            width: 44px;
            height: 44px;
            border-radius: 8px;
            color: var(--white);
            background: var(--violet);
            font-weight: 900;
        }

        .cart-list {
            overflow: auto;
            padding: 0 18px;
        }

        .cart-item {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
            margin-bottom: 10px;
            padding: 13px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--white);
        }

        .cart-item strong, .customer-box strong { display: block; }
        .cart-item small, .customer-box span { color: var(--muted); font-size: 12px; }

        .qty {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
        }

        .qty button, .icon-btn {
            display: grid;
            place-items: center;
            width: 30px;
            height: 30px;
            border-radius: 8px;
            color: var(--ink);
            background: #eef3f6;
            font-weight: 900;
        }

        .item-total {
            font-weight: 900;
            text-align: right;
        }

        .checkout {
            padding: 18px;
            border-top: 1px solid var(--line);
            background: var(--white);
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin: 9px 0;
            color: var(--muted);
        }

        .summary-row.total {
            align-items: center;
            margin-top: 14px;
            padding: 15px;
            border: 1px solid #d8f1e5;
            border-radius: 8px;
            color: var(--ink);
            background: #effbf5;
            font-size: 22px;
            font-weight: 900;
        }

        .payment-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin: 16px 0;
        }

        .pay-type {
            min-height: 50px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #f7fafc;
            font-weight: 900;
        }

        .pay-type.active {
            color: var(--white);
            border-color: var(--ink);
            background: var(--ink);
        }

        .actions {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .primary, .secondary, .danger, .ghost {
            min-height: 44px;
            border-radius: 8px;
            font-weight: 900;
        }

        .primary {
            color: var(--white);
            background: var(--green);
            box-shadow: 0 12px 22px rgba(25, 166, 106, 0.2);
        }
        .primary:hover { background: var(--green-dark); }
        .secondary { color: var(--ink); background: #edf3f7; }
        .danger { color: var(--white); background: var(--red); }
        .ghost {
            border: 1px solid var(--line);
            color: var(--teal);
            background: var(--white);
        }

        .charge { grid-column: 1 / -1; min-height: 58px; font-size: 16px; }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(130px, 1fr));
            gap: 10px;
            margin-bottom: 14px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            min-height: 26px;
            padding: 0 9px;
            border-radius: 999px;
            background: #e6f7ef;
            color: var(--green-dark);
            font-size: 12px;
            font-weight: 900;
        }

        .badge.warn { color: #8a4b00; background: #fff0d6; }
        .badge.bad { color: var(--red); background: #ffe5e5; }

        .receipt {
            display: grid;
            gap: 8px;
            padding: 14px;
            border: 1px dashed #a8b7bb;
            border-radius: 8px;
            background: #fcfefd;
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            font-size: 13px;
        }

        .qr-scanner {
            display: grid;
            gap: 12px;
        }

        .qr-camera {
            position: relative;
            overflow: hidden;
            min-height: 280px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #111923;
        }

        .qr-camera video {
            width: 100%;
            min-height: 280px;
            object-fit: cover;
            display: block;
        }

        .qr-frame {
            position: absolute;
            inset: 48px;
            border: 3px solid rgba(255, 255, 255, 0.84);
            border-radius: 8px;
            box-shadow: 0 0 0 999px rgba(17, 25, 35, 0.32);
            pointer-events: none;
        }

        .qr-status {
            padding: 11px 12px;
            border-radius: 8px;
            color: var(--muted);
            background: #f4f8fa;
            font-size: 13px;
        }

        .qr-manual {
            display: grid;
            grid-template-columns: 1fr 120px;
            gap: 10px;
        }

        .modal {
            position: fixed;
            inset: 0;
            display: none;
            place-items: center;
            padding: 18px;
            background: rgba(17, 25, 35, 0.46);
            z-index: 20;
        }

        .modal.open { display: grid; }

        .modal-box {
            width: min(760px, 100%);
            max-height: 88vh;
            overflow: auto;
            border-radius: 8px;
            background: var(--white);
            box-shadow: var(--shadow);
        }

        .modal-head, .modal-body, .modal-foot { padding: 16px; }
        .modal-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--line);
        }
        .modal-foot {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            border-top: 1px solid var(--line);
        }

        .toast {
            position: fixed;
            left: 50%;
            bottom: 18px;
            transform: translateX(-50%);
            display: none;
            max-width: min(520px, calc(100% - 32px));
            padding: 12px 14px;
            border-radius: 8px;
            color: var(--white);
            background: var(--ink);
            box-shadow: var(--shadow);
            z-index: 30;
        }

        .toast.show { display: block; }

        @media (max-width: 1220px) {
            .app { grid-template-columns: 104px minmax(0, 1fr); }
            .cart { grid-column: 1 / -1; min-height: auto; border-left: 0; border-top: 1px solid var(--line); }
            .data-grid { grid-template-columns: repeat(2, minmax(160px, 1fr)); }
        }

        @media (max-width: 860px) {
            .app, .sales-layout, .topbar, .scanner, .form-grid { grid-template-columns: 1fr; }
            .rail {
                position: sticky;
                top: 0;
                z-index: 10;
                flex-direction: row;
                overflow: auto;
            }
            .nav-btn { width: 76px; }
            .rail-spacer { display: none; }
            .content, .topbar, .scanner { padding-left: 14px; padding-right: 14px; }
        }

        @media (max-width: 540px) {
            .product-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .data-grid, .payment-grid { grid-template-columns: repeat(2, 1fr); }
            th, td { padding: 9px; }
        }
    </style>
</head>
<body>
    <div class="app">
        <nav class="rail" aria-label="POS modules">
            <div class="brand">FS</div>
            <button class="nav-btn active" data-view="sales" title="Sales">POS<span>Sales</span></button>
            <button class="nav-btn" data-view="inventory" title="Inventory">INV<span>Stock</span></button>
            <button class="nav-btn" data-view="customers" title="Customers">CRM<span>People</span></button>
            <button class="nav-btn" data-view="receipts" title="Receipts">REC<span>Receipts</span></button>
            <button class="nav-btn" data-view="reports" title="Reports">RPT<span>Reports</span></button>
            <div class="rail-spacer"></div>
            <button class="nav-btn" data-view="settings" title="Settings">SET</button>
        </nav>

        <main class="main">
            <header class="topbar">
                <div class="store">
                    <h1>FreshMart Supermarket POS</h1>
                    <span id="statusLine">Register 03 - Main checkout - Shift open</span>
                </div>
                <div class="operator">
                    <div class="avatar">TK</div>
                    <div>
                        <strong>Thivindu K.</strong>
                        <span class="muted">Cashier ID 1042</span>
                    </div>
                </div>
                <div class="clock" id="clock">00:00</div>
            </header>

            <section class="scanner" aria-label="Barcode and product search">
                <input id="searchInput" type="search" placeholder="Scan barcode or search product name">
                <select id="departmentSelect" aria-label="Department"></select>
                <button class="secondary" id="qrScan">QR Scan</button>
                <button class="primary" id="quickAdd">Quick Add</button>
            </section>

            <section class="content" id="content"></section>
        </main>

        <aside class="cart" aria-label="Current sale cart">
            <div class="cart-head">
                <h2>Current Sale</h2>
                <button class="ghost" id="recallSale">Recall</button>
            </div>
            <div class="customer-box">
                <div class="customer-icon">@</div>
                <div>
                    <strong id="customerName">Walk-in Customer</strong>
                    <span id="customerMeta">No loyalty profile attached</span>
                </div>
                <button class="ghost" id="attachCustomer">Attach</button>
            </div>
            <div class="cart-list" id="cartList"></div>
            <div class="checkout">
                <div class="summary-row"><span>Subtotal</span><strong id="subtotal">$0.00</strong></div>
                <div class="summary-row"><span>Discount</span><strong id="discount">-$0.00</strong></div>
                <div class="summary-row"><span>Tax 8%</span><strong id="tax">$0.00</strong></div>
                <div class="summary-row total"><span>Total</span><strong id="total">$0.00</strong></div>
                <div class="payment-grid" id="paymentGrid">
                    <button class="pay-type active" data-payment="Card">Card</button>
                    <button class="pay-type" data-payment="Cash">Cash</button>
                    <button class="pay-type" data-payment="Mobile">Mobile</button>
                    <button class="pay-type" data-payment="Split">Split</button>
                </div>
                <div class="actions">
                    <button class="danger" id="voidSale">Void</button>
                    <button class="secondary" id="holdSale">Hold</button>
                    <button class="primary charge" id="chargeSale">Charge Customer</button>
                </div>
            </div>
        </aside>
    </div>

    <div class="modal" id="modal" role="dialog" aria-modal="true">
        <div class="modal-box">
            <div class="modal-head">
                <h2 id="modalTitle">Dialog</h2>
                <button class="icon-btn" id="closeModal">x</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-foot" id="modalFoot"></div>
        </div>
    </div>
    <div class="toast" id="toast"></div>

    <script>
        const seedProducts = [

        ];

        const seedCustomers = [
            { id: 1, name: "Walk-in Customer", phone: "", email: "", points: 0, tier: "None" },

            { id: 4, name: "Maya Chen", phone: "555-0178", email: "maya@example.com", points: 92, tier: "Member" }
        ];

        const seedTransactions = [
            { id: "R-10038", time: "2026-05-13 09:14", customerId: 2, payment: "Card", status: "Paid", items: [{ id: 2, quantity: 2 }, { id: 8, quantity: 4 }, { id: 10, quantity: 1 }] },
            { id: "R-10039", time: "2026-05-13 11:27", customerId: 1, payment: "Cash", status: "Paid", items: [{ id: 5, quantity: 2 }, { id: 6, quantity: 6 }, { id: 12, quantity: 2 }] },
            { id: "R-10040", time: "2026-05-13 13:45", customerId: 3, payment: "Mobile", status: "Paid", items: [{ id: 7, quantity: 1 }, { id: 3, quantity: 3 }, { id: 1, quantity: 2 }] }

        const storageKey = "flowsync-pos-state-v1";
        const apiBase = `${location.origin}/api`;

        const state = saved || {
            products: seedProducts,

            heldSales: [],

        const cart = new Map(state.cart);

        const modalFoot = document.getElementById("modalFoot");

        const departmentSelect = document.getElementById("departmentSelect");
        let qrStream = null;
        let qrScanTimer = null;
        let backendReady = false;
        let saveTimer = null;

        function save() {
            state.cart = Array.from(cart.entries());
            localStorage.setItem(storageKey, JSON.stringify(state));
            if (!backendReady) return;
            clearTimeout(saveTimer);
            saveTimer = setTimeout(async () => {
                try {
                    await fetch(`${apiBase}/state`, {
                        method: "PUT",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(state)
                    });
                } catch (error) {
                    backendReady = false;
                    showToast("Backend offline. Saving in this browser for now.");
                }
            }, 250);
        }

        async function loadBackendState() {
            try {
                const response = await fetch(`${apiBase}/state`);
                if (!response.ok) throw new Error("State request failed");
                const serverState = await response.json();
                Object.assign(state, serverState);
                cart.clear();
                (state.cart || []).forEach(([id, quantity]) => cart.set(Number(id), quantity));
                renderShell(false);
                backendReady = true;
                showToast("Backend connected. Data is stored on the server.");
            } catch (error) {
                backendReady = false;
                showToast("Backend not running. Using browser storage.");
            }
        }

        async function resetBackendState() {
            if (!backendReady) {
                localStorage.removeItem(storageKey);
                location.reload();
                return;
            }
            const response = await fetch(`${apiBase}/reset`, { method: "POST" });
            const serverState = await response.json();
            Object.assign(state, serverState);
            cart.clear();
            (state.cart || []).forEach(([id, quantity]) => cart.set(Number(id), quantity));
            localStorage.setItem(storageKey, JSON.stringify(state));
            renderShell(false);
        }

        function departments() {
            return ["All", ...Array.from(new Set(state.products.map((product) => product.department)))];
        }

        function productById(id) {
            return state.products.find((product) => product.id === Number(id));
        }

        function customerById(id) {
            return state.customers.find((customer) => customer.id === Number(id)) || state.customers[0];
        }

        function cartEntries() {
            return Array.from(cart.entries()).map(([id, quantity]) => ({ ...productById(id), quantity }));
        }

        function saleTotals(items = cartEntries(), customerId = state.customerId) {
            const subtotal = items.reduce((sum, item) => sum + item.price * item.quantity, 0);
            const customer = customerById(customerId);
            const loyaltyDiscount = customer.tier === "Gold" ? subtotal * 0.05 : customer.tier === "Silver" ? subtotal * 0.03 : 0;
            const bulkDiscount = subtotal >= 60 ? subtotal * 0.04 : 0;
            const discount = Math.max(loyaltyDiscount, bulkDiscount);
            const tax = (subtotal - discount) * state.taxRate;
            return { subtotal, discount, tax, total: subtotal - discount + tax };
        }

        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.textContent = message;
            toast.classList.add("show");
            clearTimeout(showToast.timer);
            showToast.timer = setTimeout(() => toast.classList.remove("show"), 2200);
        }

        function openModal(title, body, foot = "") {
            modalTitle.textContent = title;
            modalBody.innerHTML = body;
            modalFoot.innerHTML = foot;
            modal.classList.add("open");
        }

        function closeModal() {
            stopQrScanner();
            modal.classList.remove("open");
        }

        function stopQrScanner() {
            if (qrScanTimer) {
                clearInterval(qrScanTimer);
                qrScanTimer = null;
            }
            if (qrStream) {
                qrStream.getTracks().forEach((track) => track.stop());
                qrStream = null;
            }
        }

        function renderShell(shouldSave = true) {
            document.querySelectorAll(".nav-btn").forEach((button) => {
                button.classList.toggle("active", button.dataset.view === state.activeView);
            });
            departmentSelect.innerHTML = departments().map((department) => `<option value="${department}">${department}</option>`).join("");
            departmentSelect.value = state.activeDepartment;
            document.getElementById("statusLine").textContent = state.registerOpen
                ? "Register 03 - Main checkout - Shift open"
                : "Register 03 - Register closed";
            renderCart();
            renderView();
            if (shouldSave) save();
        }

        function renderView() {
            if (state.activeView === "sales") renderSales();
            if (state.activeView === "inventory") renderInventory();
            if (state.activeView === "customers") renderCustomers();
            if (state.activeView === "receipts") renderReceipts();
            if (state.activeView === "reports") renderReports();
            if (state.activeView === "settings") renderSettings();
        }

        function renderReports() {
            const deptTotals = {};
            state.transactions.filter((tx) => tx.status === "Paid").forEach((tx) => {
                tx.items.forEach((item) => {
                    const product = productById(item.id);
                    deptTotals[product.department] = (deptTotals[product.department] || 0) + product.price * item.quantity;
                });
            });
            const bestSellers = state.products.map((product) => {
                const sold = state.transactions.reduce((sum, tx) => {
                    if (tx.status !== "Paid") return sum;
                    const item = tx.items.find((entry) => entry.id === product.id);
                    return sum + (item ? item.quantity : 0);
                }, 0);
                return { ...product, sold };
            }).sort((a, b) => b.sold - a.sold).slice(0, 6);

            content.innerHTML = `
                <div class="section-head"><h2>Sales Reports</h2><button class="secondary" id="endShift">End Shift</button></div>
                <div class="data-grid">
                    <div class="data-card"><span>Gross Sales</span><strong>${money.format(todaySales())}</strong></div>
                    <div class="data-card"><span>Net Profit</span><strong>${money.format(todayProfit())}</strong></div>
                    <div class="data-card"><span>Average Basket</span><strong>${money.format(avgBasket())}</strong></div>

                    </div>
                    <div class="panel">
                        <h3>Best Sellers</h3>

                </div>
                <div class="panel">
                    <h3>System Coverage</h3>
                    <p class="muted">This POS includes sales checkout, product inventory, customer loyalty, held sales, receipts, refunds, shift reporting, tax settings, and persistent backend storage. If the backend is offline, it temporarily falls back to browser storage.</p>
                </div>
            `;
            document.getElementById("registerStatus").value = state.registerOpen ? "open" : "closed";
        }

        function renderCart() {
            const entries = cartEntries();
            const customer = customerById(state.customerId);
            document.getElementById("customerName").textContent = customer.name;
            document.getElementById("customerMeta").textContent = customer.id === 1 ? "No loyalty profile attached" : `${customer.tier} member - ${customer.points} points`;

            document.getElementById("cartList").innerHTML = entries.map((item) => `
                <div class="cart-item">
                    <div>
                        <strong>${item.name}</strong>
                        <small>${money.format(item.price)} - ${item.unit}</small>
                        <div class="qty">
                            <button data-cart-minus="${item.id}">-</button>
                            <span>${item.quantity}</span>
                            <button data-cart-plus="${item.id}">+</button>
                            <button data-cart-remove="${item.id}">x</button>
                        </div>
                    </div>
                    <div class="item-total">${money.format(item.price * item.quantity)}</div>
                </div>
            `).join("") || `<div class="panel">Cart is empty.</div>`;

            const totals = saleTotals(entries);
            document.getElementById("subtotal").textContent = money.format(totals.subtotal);
            document.getElementById("discount").textContent = `-${money.format(totals.discount)}`;
            document.getElementById("tax").textContent = money.format(totals.tax);
            document.getElementById("total").textContent = money.format(totals.total);
            document.querySelectorAll(".pay-type").forEach((button) => {
                button.classList.toggle("active", button.dataset.payment === state.payment);
            });
        }

        function addToCart(id) {
            const product = productById(id);
            if (!product || product.stock <= 0) {
                showToast("Product is out of stock.");
                return;
            }
            cart.set(Number(id), (cart.get(Number(id)) || 0) + 1);
            renderCart();
            save();
        }

        function productFromScan(code) {
            const raw = String(code || "").trim();
            if (!raw) return null;
            const normalized = raw.toLowerCase();
            let sku = raw;

            try {
                const url = new URL(raw);
                sku = url.searchParams.get("sku") || url.searchParams.get("code") || raw;
            } catch (error) {
                const skuMatch = raw.match(/sku[:=\s-]*([a-z0-9-]+)/i);
                if (skuMatch) sku = skuMatch[1];
            }

            return state.products.find((product) => {
                const productText = `${product.sku} ${product.name} ${product.id}`.toLowerCase();
                return product.sku === sku || String(product.id) === sku || productText.includes(normalized);
            });
        }

        function useScannedCode(code) {
            const product = productFromScan(code);
            if (!product) {
                showToast(`No product found for ${code}`);
                return;
            }
            addToCart(product.id);
            searchInput.value = product.sku;
            closeModal();
            showToast(`${product.name} added from QR scan.`);
        }

        async function openQrScanner() {
            openModal("QR Product Scanner", `
                <div class="qr-scanner">
                    <div class="qr-camera">
                        <video id="qrVideo" autoplay muted playsinline></video>
                        <div class="qr-frame"></div>
                    </div>
                    <div class="qr-status" id="qrStatus">Starting camera. You can also enter a product SKU manually.</div>
                    <div class="qr-manual">
                        <input id="qrManualCode" placeholder="Enter SKU, QR text, or product code">
                        <button class="primary" id="qrManualAdd">Add</button>
                    </div>
                </div>
            `, `<button class="secondary" id="doneModal">Close Scanner</button>`);

            const status = document.getElementById("qrStatus");
            const video = document.getElementById("qrVideo");
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                status.textContent = "Camera access is not available in this browser. Use manual SKU entry below.";
                return;
            }
            if (!("BarcodeDetector" in window)) {
                status.textContent = "This browser does not support live QR detection. Use manual SKU entry below.";
                return;
            }

            try {
                qrStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = qrStream;
                const detector = new BarcodeDetector({ formats: ["qr_code", "code_128", "ean_13", "ean_8", "upc_a", "upc_e"] });
                status.textContent = "Point the camera at a product QR code or barcode.";
                qrScanTimer = setInterval(async () => {
                    if (!video.videoWidth) return;
                    try {
                        const codes = await detector.detect(video);
                        if (codes.length) useScannedCode(codes[0].rawValue);
                    } catch (error) {
                        status.textContent = "Scanning paused. Try better lighting or use manual entry.";
                    }
                }, 650);
            } catch (error) {
                status.textContent = "Camera permission was blocked or unavailable. Use manual SKU entry below.";
            }
        }

        function chargeSale() {
            const entries = cartEntries();
            if (!state.registerOpen) return showToast("Open the register before charging a sale.");
            if (!entries.length) return showToast("Add at least one product to the cart.");
            const oversold = entries.find((item) => item.quantity > item.stock);
            if (oversold) return showToast(`${oversold.name} does not have enough stock.`);

            entries.forEach((item) => {
                productById(item.id).stock -= item.quantity;
            });
            const receiptId = `R-${state.nextReceipt++}`;
            const now = new Date();
            const transaction = {
                id: receiptId,
                time: `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}-${String(now.getDate()).padStart(2, "0")} ${String(now.getHours()).padStart(2, "0")}:${String(now.getMinutes()).padStart(2, "0")}`,
                customerId: state.customerId,
                payment: state.payment,
                status: "Paid",
                items: entries.map((item) => ({ id: item.id, quantity: item.quantity }))
            };
            state.transactions.push(transaction);
            const customer = customerById(state.customerId);
            if (customer.id !== 1) customer.points += Math.floor(saleTotals(entries).total);
            cart.clear();
            state.customerId = 1;
            save();
            renderShell();
            viewReceipt(receiptId);
            showToast(`Sale charged: ${receiptId}`);
        }

        function viewReceipt(receiptId) {
            const tx = state.transactions.find((transaction) => transaction.id === receiptId);
            if (!tx) return;
            const items = tx.items.map((item) => ({ ...productById(item.id), quantity: item.quantity }));
            const totals = saleTotals(items, tx.customerId);
            openModal("Receipt", `
                <div class="receipt" id="receiptPrint">
                    <strong>FreshMart Supermarket</strong>
                    <span>Receipt ${tx.id}</span>
                    <span>${tx.time} - ${tx.payment} - ${tx.status}</span>
                    <span>Customer: ${customerById(tx.customerId).name}</span>
                    <hr>
                    ${items.map((item) => `<span>${item.quantity} x ${item.name} ${money.format(item.price * item.quantity)}</span>`).join("")}
                    <hr>
                    <span>Subtotal: ${money.format(totals.subtotal)}</span>
                    <span>Discount: -${money.format(totals.discount)}</span>
                    <span>Tax: ${money.format(totals.tax)}</span>
                    <strong>Total: ${money.format(totals.total)}</strong>
                </div>
            `, `<button class="secondary" onclick="window.print()">Print</button><button class="primary" id="doneModal">Done</button>`);
        }

        function holdSale() {
            const entries = cartEntries();
            if (!entries.length) return showToast("Cart is empty.");
            state.heldSales.push({
                name: `Hold ${state.heldSales.length + 1} - ${customerById(state.customerId).name}`,
                customerId: state.customerId,
                payment: state.payment,
                cart: Array.from(cart.entries())
            });
            cart.clear();
            state.customerId = 1;
            save();
            renderShell();
            showToast("Sale placed on hold.");
        }

        function recallSale(index = 0) {
            if (!state.heldSales.length) return showToast("No held sales to recall.");
            const sale = state.heldSales.splice(Number(index), 1)[0];
            cart.clear();
            sale.cart.forEach(([id, qty]) => cart.set(Number(id), qty));
            state.customerId = sale.customerId;
            state.payment = sale.payment;
            save();
            renderShell();
            showToast("Held sale recalled.");
        }

        function attachCustomerDialog() {
            openModal("Attach Customer", `
                <table>
                    <thead><tr><th>Name</th><th>Phone</th><th>Tier</th><th></th></tr></thead>
                    <tbody>
                        ${state.customers.map((customer) => `
                            <tr>
                                <td>${customer.name}</td>
                                <td>${customer.phone || "-"}</td>
                                <td>${customer.tier}</td>
                                <td><button class="primary" data-modal-customer="${customer.id}">Attach</button></td>
                            </tr>
                        `).join("")}
                    </tbody>
                </table>
            `, `<button class="secondary" id="doneModal">Cancel</button>`);
        }

        function productDialog(product = null) {
            const editing = Boolean(product);
            openModal(editing ? "Edit Product" : "Add Product", `
                <div class="form-grid">
                    <input id="pSku" placeholder="SKU" value="${product?.sku || ""}">
                    <input id="pName" placeholder="Product name" value="${product?.name || ""}">
                    <input id="pDepartment" placeholder="Department" value="${product?.department || ""}">
                    <input id="pPrice" type="number" step="0.01" placeholder="Price" value="${product?.price || ""}">
                    <input id="pCost" type="number" step="0.01" placeholder="Cost" value="${product?.cost || ""}">
                    <input id="pStock" type="number" placeholder="Stock" value="${product?.stock || ""}">
                    <input id="pReorder" type="number" placeholder="Reorder level" value="${product?.reorder || ""}">
                    <input id="pIcon" placeholder="Tile code" value="${product?.icon || ""}">
                </div>
            `, `<button class="secondary" id="doneModal">Cancel</button><button class="primary" data-save-product="${product?.id || ""}">Save Product</button>`);
        }

        function customerDialog(customer = null) {
            openModal(customer ? "Edit Customer" : "Add Customer", `
                <div class="form-grid">
                    <input id="cName" placeholder="Name" value="${customer?.name || ""}">
                    <input id="cPhone" placeholder="Phone" value="${customer?.phone || ""}">
                    <input id="cEmail" placeholder="Email" value="${customer?.email || ""}">
                    <select id="cTier">
                        ${["Member", "Silver", "Gold"].map((tier) => `<option value="${tier}">${tier}</option>`).join("")}
                    </select>
                    <input id="cPoints" type="number" placeholder="Points" value="${customer?.points || 0}">
                </div>
            `, `<button class="secondary" id="doneModal">Cancel</button><button class="primary" data-save-customer="${customer?.id || ""}">Save Customer</button>`);
            document.getElementById("cTier").value = customer?.tier || "Member";
        }

        function todaySales() {
            return state.transactions.filter((tx) => tx.status === "Paid").reduce((sum, tx) => {
                const items = tx.items.map((item) => ({ ...productById(item.id), quantity: item.quantity }));
                return sum + saleTotals(items, tx.customerId).total;
            }, 0);
        }

        function todayProfit() {
            return state.transactions.filter((tx) => tx.status === "Paid").reduce((sum, tx) => {
                return sum + tx.items.reduce((itemSum, item) => {
                    const product = productById(item.id);
                    return itemSum + (product.price - product.cost) * item.quantity;
                }, 0);
            }, 0);
        }

        function avgBasket() {
            const paid = state.transactions.filter((tx) => tx.status === "Paid");
            return paid.length ? todaySales() / paid.length : 0;
        }

        function stockValue() {
            return state.products.reduce((sum, product) => sum + product.cost * product.stock, 0);
        }

        document.addEventListener("click", (event) => {
            const target = event.target.closest("button");
            if (!target) return;

            if (target.dataset.view) {
                state.activeView = target.dataset.view;
                renderShell();
            }
            if (target.dataset.department) {
                state.activeDepartment = target.dataset.department;
                departmentSelect.value = state.activeDepartment;
                renderSales();
                save();
            }
            if (target.dataset.add) addToCart(target.dataset.add);
            if (target.dataset.cartPlus) addToCart(target.dataset.cartPlus);
            if (target.dataset.cartMinus) {
                const id = Number(target.dataset.cartMinus);
                const qty = cart.get(id) || 0;
                qty <= 1 ? cart.delete(id) : cart.set(id, qty - 1);
                renderCart();
                save();
            }
            if (target.dataset.cartRemove) {
                cart.delete(Number(target.dataset.cartRemove));
                renderCart();
                save();
            }
            if (target.dataset.payment) {
                state.payment = target.dataset.payment;
                renderCart();
                save();
            }
            if (target.id === "quickAdd") {
                const query = searchInput.value.trim().toLowerCase();
                const product = state.products.find((item) => `${item.sku} ${item.name}`.toLowerCase().includes(query)) || state.products[0];
                addToCart(product.id);
            }
            if (target.id === "qrScan") openQrScanner();
            if (target.id === "qrManualAdd") {
                const code = document.getElementById("qrManualCode").value;
                useScannedCode(code);
            }
            if (target.id === "voidSale") {
                cart.clear();
                state.customerId = 1;
                renderShell();
                showToast("Current sale voided.");
            }
            if (target.id === "holdSale") holdSale();
            if (target.id === "recallSale") recallSale();
            if (target.dataset.recall) recallSale(target.dataset.recall);
            if (target.id === "chargeSale") chargeSale();
            if (target.id === "attachCustomer") attachCustomerDialog();
            if (target.dataset.modalCustomer) {
                state.customerId = Number(target.dataset.modalCustomer);
                closeModal();
                renderShell();
            }
            if (target.dataset.selectCustomer) {
                state.customerId = Number(target.dataset.selectCustomer);
                renderShell();
                showToast("Customer attached to current sale.");
            }
            if (target.id === "addProduct") productDialog();
            if (target.dataset.editProduct) productDialog(productById(target.dataset.editProduct));
            if (target.dataset.restock) {
                productById(target.dataset.restock).stock += 12;
                renderShell();
                showToast("Product restocked by 12 units.");
            }
            if (target.dataset.saveProduct !== undefined) {
                const id = Number(target.dataset.saveProduct);
                const product = id ? productById(id) : { id: Date.now() };
                Object.assign(product, {
                    sku: document.getElementById("pSku").value || String(product.id),
                    name: document.getElementById("pName").value || "New Product",
                    department: document.getElementById("pDepartment").value || "General",
                    price: Number(document.getElementById("pPrice").value || 0),
                    cost: Number(document.getElementById("pCost").value || 0),
                    stock: Number(document.getElementById("pStock").value || 0),
                    reorder: Number(document.getElementById("pReorder").value || 0),
                    icon: document.getElementById("pIcon").value || "NP"
                });
                if (!id) state.products.push(product);
                closeModal();
                renderShell();
            }
            if (target.id === "addCustomer") customerDialog();
            if (target.dataset.editCustomer) customerDialog(customerById(target.dataset.editCustomer));
            if (target.dataset.saveCustomer !== undefined) {
                const id = Number(target.dataset.saveCustomer);
                const customer = id ? customerById(id) : { id: Date.now() };
                Object.assign(customer, {
                    name: document.getElementById("cName").value || "New Customer",
                    phone: document.getElementById("cPhone").value || "",
                    email: document.getElementById("cEmail").value || "",
                    tier: document.getElementById("cTier").value,
                    points: Number(document.getElementById("cPoints").value || 0)
                });
                if (!id) state.customers.push(customer);
                closeModal();
                renderShell();
            }
            if (target.dataset.viewReceipt) viewReceipt(target.dataset.viewReceipt);
            if (target.dataset.refund) {
                const tx = state.transactions.find((item) => item.id === target.dataset.refund);
                if (tx && tx.status !== "Refunded") {
                    tx.status = "Refunded";
                    tx.items.forEach((item) => productById(item.id).stock += item.quantity);
                    renderShell();
                    showToast("Receipt refunded and stock returned.");
                }
            }
            if (target.id === "exportReceipts") {
                const csv = ["receipt,time,customer,payment,status"].concat(state.transactions.map((tx) => `${tx.id},${tx.time},${customerById(tx.customerId).name},${tx.payment},${tx.status}`)).join("\\n");
                openModal("Receipt Export", `<textarea style="width:100%;min-height:220px">${csv}</textarea>`, `<button class="primary" id="doneModal">Done</button>`);
            }
            if (target.id === "endShift") {
                state.registerOpen = false;
                renderShell();
                showToast("Shift ended. Register is now closed.");
            }
            if (target.id === "saveSettings") {
                state.taxRate = Number(document.getElementById("taxInput").value || 0);
                state.registerOpen = document.getElementById("registerStatus").value === "open";
                renderShell();
                showToast("Settings saved.");
            }
            if (target.id === "resetDemo") {
                resetBackendState();
            }
            if (target.id === "closeModal" || target.id === "doneModal") closeModal();
        });

        searchInput.addEventListener("input", () => {
            if (state.activeView !== "sales") state.activeView = "sales";
            renderShell();
        });

        departmentSelect.addEventListener("change", () => {
            state.activeDepartment = departmentSelect.value;
            state.activeView = "sales";
            renderShell();
        });

        function updateClock() {
            document.getElementById("clock").textContent = new Intl.DateTimeFormat("en-US", {
                hour: "2-digit",
                minute: "2-digit"
            }).format(new Date());
        }

        updateClock();
        setInterval(updateClock, 30000);
        renderShell(false);
        loadBackendState();
    </script>
</body>
</html>
